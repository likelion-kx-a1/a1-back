spring:
  application:
    name: a1-back
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/a1}
    username: ${DB_USERNAME:a1}
    password: ${DB_PASSWORD:a1-local-password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${STORAGE_BUCKET:a1-media}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    endpoint: ${STORAGE_ENDPOINT:}
    path-style-access: ${STORAGE_PATH_STYLE_ACCESS:false}
  ai:
    fal:
      base-url: ${FAL_BASE_URL:https://queue.fal.run}
      api-key: ${FAL_API_KEY:}
    claude:
      base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${CLAUDE_MODEL:claude-sonnet-5}
      version: ${ANTHROPIC_VERSION:2023-06-01}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_VISION_MODEL:gpt-4.1}
