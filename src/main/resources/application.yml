spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: a1-back
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/a1}
    username: ${DB_USERNAME:a1}
    password: ${DB_PASSWORD:a1-local-password}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,https://*.vercel.app}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  storage:
    region: ${AWS_REGION:ap-northeast-2}
    bucket: ${STORAGE_BUCKET:a1-media}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    endpoint: ${STORAGE_ENDPOINT:}
    path-style-access: ${STORAGE_PATH_STYLE_ACCESS:false}
    access-key: ${STORAGE_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
    secret-key: ${STORAGE_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-bytes}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
    fal:
      api-key: ${FAL_API_KEY:}
