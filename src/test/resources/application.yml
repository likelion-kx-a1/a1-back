spring:
  datasource:
    url: jdbc:h2:mem:a1;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
app:
  openai:
    api-key:
    base-url: http://localhost
    image-model: gpt-image-2
  fal:
    api-key:
    queue-base-url: http://localhost
    video-model: bytedance/seedance-2.0/text-to-video
    poll-interval: 3600000
  storage:
    region: ap-northeast-2
    bucket: test-bucket
    public-base-url:
    endpoint:
    path-style-access: false
