spring:
  datasource:
    url: jdbc:h2:mem:a1;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  mail:
    host: localhost
    port: 2525
    username:
    password:
  jpa:
