services:
  backend:
    image: ${ECR_REGISTRY:-310971189070.dkr.ecr.ap-northeast-2.amazonaws.com}/${ECR_REPOSITORY:-a1-back-prod}:${IMAGE_TAG:-latest}
    container_name: a1-backend
    env_file: ${ENV_FILE:-.env}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports: ["127.0.0.1:8080:8080"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: a1-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
