services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a1
      POSTGRES_USER: a1
      POSTGRES_PASSWORD: a1-local-password
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a1"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-local-password
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "until mc alias set local http://minio:9000 minio minio-local-password; do sleep 2; done; mc mb -p local/a1-media; mc anonymous set download local/a1-media"
      ]

volumes:
  postgres_data:
  minio_data:
